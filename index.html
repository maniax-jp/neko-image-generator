<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫画像生成器 - Powered by Puter.js</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <div class="container">
        <h1>猫画像生成器</h1>
        <div id="image-container" class="canvas-container">
            <!-- 生成された画像がここに挿入されます -->
            <div id="placeholder-text">ここに画像が表示されます</div>
        </div>
        <div class="input-group">
            <input type="text" id="prompt-input" placeholder="生成したい猫の指示を入力してください" value="a cute cat">
            <button id="generate-btn">猫画像を生成</button>
        </div>
    </div>
    <script src="main.js" type="module"></script>
</body>
</html>
